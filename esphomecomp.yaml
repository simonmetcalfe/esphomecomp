# working example with NV storage
esphome:
  name: tester-esphomecomp
  friendly_name: tester_esphomecomp

  # Set sensor default values
  on_boot:
    priority: 600 
    then:


esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:
  level: INFO

# script:


# Enable Home Assistant API
api:
  encryption:
    key: "yQjSaKxKmWQ+aOYtsqOzD4+YSjqYanUY7ChoLtXkjWU="

ota:
  - platform: esphome
    password: "df55eefb7b010b19fbc2842c827eab72"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Tester-Esphomecomp"
    password: "y37vCI6RwXNV"

captive_portal:

#  globals:

    
output:


light:

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: wifi_signal_strength
    update_interval: 2000ms
    entity_category: "diagnostic"


  - platform: empty_sensor
    name: Empty sensor
    update_interval: 2000ms


  - platform: plant_compound_sensor
    plant1:
      name: Plant 1
      state_class: measurement
    plant2:
      name: Plant 2
      state_class: measurement
    plant3:
      name: Plant 3
      state_class: measurement
    plant4:
      name: Plant 4
      state_class: measurement
    update_interval: 2000ms

  # Plant sensor hub - compound sensors per plant (moisture + water_count)
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 0
    moisture:
      name: Plant 1 Moisture
    water_count:
      name: Plant 1 Water Count
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 1
    moisture:
      name: Plant 2 Moisture
    water_count:
      name: Plant 2 Water Count


binary_sensor:
  - platform: empty_binary_sensor
    name: Empty binary sensor
    # update_interval not supported

  # Plant sensor hub - global binary sensors
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    type: tank_empty
    name: Tank Empty
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    type: alarm
    name: Alarm
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    type: watering_active
    name: Watering Active



text_sensor:
  - platform: empty_text_sensor
    name: Empty text sensor
    # update_interval not supported

  # Plant sensor hub - per-plant state
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 0
    name: Plant 1 State
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 1
    name: Plant 2 State


empty_component:
  id: empty_component_1
  # update_interval not supported

number:
  # Plant sensor hub - per-plant settings (persistent, BOX mode)
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 0
    type: pot_size
    name: Plant 1 Pot Size
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 0
    type: min_moisture
    name: Plant 1 Min Moisture
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 0
    type: max_moisture
    name: Plant 1 Max Moisture
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 1
    type: pot_size
    name: Plant 2 Pot Size
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 1
    type: min_moisture
    name: Plant 2 Min Moisture
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 1
    type: max_moisture
    name: Plant 2 Max Moisture
  # Volatile (not persisted) - C++ decides whether to save
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 0
    type: leak_threshold
    name: Plant 1 Leak Threshold
  - platform: plant_sensor_hub
    plant_sensor_hub_id: plant_hub
    plant_index: 1
    type: leak_threshold
    name: Plant 2 Leak Threshold

# Plant watering system hub - global + per-plant sensors
plant_sensor_hub:
  id: plant_hub
  num_plants: 4
  update_interval: 60s

    
external_components:
  - source: 
      type: git
      url: https://github.com/simonmetcalfe/esphomecomp.git
      ref: plant-sensor-hub # CONFIGURED TO USE BRANCH
    components: [ empty_sensor, plant_compound_sensor, plant_sensor_hub, empty_binary_sensor, empty_component, empty_text_sensor ]
    refresh: always
